name: release-assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin zip
        run: |
          mkdir -p build/studio-kyne-mini-tools
          rsync -a --exclude ".git" --exclude ".github" --exclude "build" ./ build/studio-kyne-mini-tools/
          cd build
          zip -r studio-kyne-mini-tools.zip studio-kyne-mini-tools
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/studio-kyne-mini-tools.zip
