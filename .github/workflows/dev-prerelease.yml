name: dev-prerelease

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin zip
        run: |
          mkdir -p build/studio-kyne-mini-tools
          rsync -a --exclude ".git" --exclude ".github" --exclude "build" ./ build/studio-kyne-mini-tools/
          cd build
          zip -r studio-kyne-mini-tools.zip studio-kyne-mini-tools
      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: Dev build ${{ github.sha }}
          prerelease: true
          files: build/studio-kyne-mini-tools.zip
