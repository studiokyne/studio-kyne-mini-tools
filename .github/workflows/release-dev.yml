name: Release Dev Pre-release

on:
  push:
    branches:
      - dev

permissions:
  contents: write

concurrency:
  group: skmt-release-dev
  cancel-in-progress: false
  queue: max

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0

      - name: Fetch full tag history
        run: git fetch --tags --force

      - name: Determine dev release version
        id: version
        run: |
          set -euo pipefail

          file_version=$(grep -Eo "define[[:space:]]*\([[:space:]]*'SKMT_VERSION'[[:space:]]*,[[:space:]]*'[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?'" studio-kyne-mini-tools.php | sed -E "s/.*'([0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?)'/\1/")
          if [[ -z "$file_version" ]]; then
            echo "Unable to detect plugin version"
            exit 1
          fi

          # Strip any suffix to get the base semver (e.g. 1.0.2-dev.4 -> 1.0.2)
          file_base_version=$(echo "$file_version" | sed -E 's/-[a-z].*//')

          latest_stable_tag=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          if [[ -n "$latest_stable_tag" ]]; then
            base_version="${latest_stable_tag#v}"
          else
            base_version="$file_base_version"
          fi

          latest_dev_tag=$(git tag -l "v${base_version}-dev.*" | grep -E "^v${base_version}-dev\.[0-9]+$" | sort -V | tail -n1 || true)
          if [[ -z "$latest_dev_tag" ]]; then
            dev_build=1
          else
            dev_build=${latest_dev_tag##*.}
            dev_build=$((dev_build + 1))
          fi

          target_version="${base_version}-dev.${dev_build}"
          target_tag="v${target_version}"

          echo "Base version: $base_version"
          echo "Latest dev tag: ${latest_dev_tag:-none}"
          echo "Target version: $target_version"
          echo "Target tag: $target_tag"

          echo "version=$target_version" >> "$GITHUB_OUTPUT"
          echo "tag=$target_tag" >> "$GITHUB_OUTPUT"

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update plugin version in files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          sed -E -i "s/^ \* Version:[[:space:]]+.*/ * Version:     ${VERSION}/" studio-kyne-mini-tools.php
          sed -E -i "s/(define[[:space:]]*\([[:space:]]*'SKMT_VERSION'[[:space:]]*,[[:space:]]*')[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]*)?/\1${VERSION}/" studio-kyne-mini-tools.php

      - name: Create and push tag
        env:
          TARGET_TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          if git rev-parse "$TARGET_TAG" >/dev/null 2>&1; then
            echo "Tag ${TARGET_TAG} already exists"
            exit 1
          fi

          git add studio-kyne-mini-tools.php
          git commit -m "chore(release): v${VERSION}"
          git tag -a "$TARGET_TAG" -m "Dev release ${TARGET_TAG}"
          git push origin HEAD:refs/heads/dev
          git push origin "$TARGET_TAG"

      - name: Build release zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist/package/studio-kyne-mini-tools
          rsync -a ./ dist/package/studio-kyne-mini-tools/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='node_modules' \
            --exclude='dist'
          cd dist/package
          zip -r "../studio-kyne-mini-tools-${VERSION}.zip" studio-kyne-mini-tools

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/studio-kyne-mini-tools-${{ steps.version.outputs.version }}.zip
          prerelease: true
          generate_release_notes: true
          body: |
            Automatic dev pre-release for branch dev.

            This release is published on every push to dev so it can be tested through the WordPress updater on a production-like environment.

      - name: Delete old dev pre-releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 100 \
            --json tagName,isPrerelease \
            | jq -r '.[] | select(.isPrerelease == true) | .tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$' \
            | grep -v "^${NEW_TAG}$" \
            | while IFS= read -r tag; do
                echo "Deleting old dev pre-release: $tag"
                gh release delete "$tag" --yes --cleanup-tag || true
              done
