name: release-from-version

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: version
        run: |
          file=$(grep -RIl --max-depth=2 "^\s*Plugin Name:\s*Studio Kyne Mini Tools" . || true)
          if [ -z "$file" ]; then
            echo "Plugin header not found" >&2
            exit 1
          fi
          version=$(awk 'BEGIN{IGNORECASE=1} /^\s*Version:\s*/ {gsub(/^\s*Version:\s*/, "", $0); print $0; exit}' "$file")
          if [ -z "$version" ]; then
            echo "Version not found" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag
        id: tag
        run: |
          tag="v${{ steps.version.outputs.value }}"
          echo "name=$tag" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tag.outputs.exists != 'true'
        run: |
          git tag "${{ steps.tag.outputs.name }}"
          git push origin "${{ steps.tag.outputs.name }}"

      - name: Create release
        if: steps.tag.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
