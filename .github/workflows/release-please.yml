name: Release Stable Version

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: skmt-release-stable
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Fetch full tag history
        run: git fetch --tags --force

      - name: Determine release version
        id: version
        run: |
          set -euo pipefail

          current_version=$(grep -Eo "define[[:space:]]*\([[:space:]]*'SKMT_VERSION'[[:space:]]*,[[:space:]]*'[0-9]+\.[0-9]+\.[0-9]+" studio-kyne-mini-tools.php | sed -E "s/.*'([0-9]+\.[0-9]+\.[0-9]+)'/\1/")

          if [[ -z "$current_version" ]]; then
            echo "Unable to detect current version from studio-kyne-mini-tools.php"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$current_version"
          target_version="${major}.${minor}.$((patch + 1))"

          echo "Current version: $current_version"
          echo "Target version: $target_version"
          echo "version=$target_version" >> "$GITHUB_OUTPUT"

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update plugin version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          sed -E -i "s/^ \* Version:[[:space:]]+.*/ * Version:     ${VERSION}/" studio-kyne-mini-tools.php
          sed -E -i "s/(define[[:space:]]*\([[:space:]]*'SKMT_VERSION'[[:space:]]*,[[:space:]]*')[0-9]+\.[0-9]+\.[0-9]+/\1${VERSION}/" studio-kyne-mini-tools.php

      - name: Commit release version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git add studio-kyne-mini-tools.php
          git commit -m "chore(release): v${VERSION}"
          git push origin "HEAD:refs/heads/${TARGET_BRANCH}"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          tag="v${VERSION}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists"
            exit 1
          fi

          git tag -a "$tag" -m "Release ${tag}"
          git push origin "$tag"

      - name: Build release zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist/package/studio-kyne-mini-tools
          rsync -a ./ dist/package/studio-kyne-mini-tools/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='node_modules' \
            --exclude='dist'
          cd dist/package
          zip -r "../studio-kyne-mini-tools-${VERSION}.zip" studio-kyne-mini-tools

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/studio-kyne-mini-tools-${{ steps.version.outputs.version }}.zip
          prerelease: false
          generate_release_notes: true
