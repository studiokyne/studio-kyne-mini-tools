name: release-from-version

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: version
        run: |
          file=$(find . -maxdepth 2 -type f -name "*.php" -print0 | xargs -0 grep -Il "^\s*Plugin Name:\s*Studio Kyne Mini Tools" | head -n1 || true)
          if [ -z "$file" ]; then
            echo "Plugin header not found" >&2
            exit 1
          fi
          version=$(awk 'BEGIN{IGNORECASE=1} /^\s*Version:\s*/ {gsub(/^\s*Version:\s*/, "", $0); print $0; exit}' "$file")
          if [ -z "$version" ]; then
            echo "Version not found" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Get latest release version
        id: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | python3 - <<'PY'
import json, sys
try:
    data = json.load(sys.stdin)
    tag = data.get("tag_name", "")
    print(tag.lstrip("v"))
except Exception:
    print("")
PY
          )
          echo "value=$latest" >> "$GITHUB_OUTPUT"

      - name: Validate version bump
        run: |
          current="${{ steps.version.outputs.value }}"
          latest="${{ steps.latest.outputs.value }}"
          if [ -z "$latest" ]; then
            echo "No previous release found. Proceeding."
            exit 0
          fi
          newest=$(printf '%s\n' "$latest" "$current" | sort -V | tail -n1)
          if [ "$newest" != "$current" ] || [ "$current" = "$latest" ]; then
            echo "Version must be greater than latest release ($latest)" >&2
            exit 1
          fi
          echo "Version OK: $current > $latest"

      - name: Check tag
        id: tag
        run: |
          tag="v${{ steps.version.outputs.value }}"
          echo "name=$tag" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tag.outputs.exists != 'true'
        run: |
          git tag "${{ steps.tag.outputs.name }}"
          git push origin "${{ steps.tag.outputs.name }}"

      - name: Create release
        if: steps.tag.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
